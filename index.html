<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F6F2E8" />
    <title>Skill Library · 技能资料库</title>
    <meta name="description" content="按类别整理的 Claude Skills 资料库 —— 电商品牌网站、内容创作、SEO、设计、开发、营销、运营。" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" />

    <link rel="alternate" type="application/rss+xml" title="Skill Library" href="/skill-library/rss.xml" />
    <link rel="sitemap" type="application/xml" href="/skill-library/sitemap.xml" />

    <script>
      // Apply theme before render to avoid FOUC
      (function () {
        try {
          var t = localStorage.getItem('sl_theme_v1');
          if (t === 'sepia' || t === 'dark') document.documentElement.dataset.theme = t;
          else document.documentElement.dataset.theme = 'light';
        } catch (e) { document.documentElement.dataset.theme = 'light'; }
      })();
    </script>
    <script>
      // GitHub Pages SPA route restoration (rafgraph/spa-github-pages)
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
